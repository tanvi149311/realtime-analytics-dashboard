# ─────────────────────────────────────────
# nginx.conf
# Configures Nginx to serve our React app.
# Handles client-side routing correctly.
# ─────────────────────────────────────────

server {
    listen 80;
    server_name localhost;

    # Serve files from this directory
    root /usr/share/nginx/html;
    index index.html;

    # ── Client-side routing fix ──
    # Without this, refreshing on /dashboard
    # would return 404. This sends all routes
    # back to index.html so React Router handles it.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Cache static assets ──
    # JS/CSS files have hashed names so
    # they can be cached aggressively.
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
